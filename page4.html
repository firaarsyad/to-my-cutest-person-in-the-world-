<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>buka suratnya</title>
<link rel="stylesheet" href="style.css">
<style>
  .env-stage{
    width:280px; height:190px;
    position:relative;
    margin:2.4rem auto 1rem auto;
    cursor:pointer;
    perspective:1000px;
  }
  .env-back{
    position:absolute; inset:0;
    background:linear-gradient(160deg,#efe6cf,#e2d6b8);
    border-radius:6px;
    box-shadow:0 20px 30px rgba(0,0,0,0.28);
  }
  .env-back::before, .env-back::after{
    content:"";
    position:absolute; bottom:0; width:52%; height:100%;
    background:#dccfa9;
  }
  .env-back::before{ left:0; clip-path:polygon(0 100%, 0 15%, 100% 100%); }
  .env-back::after{ right:0; clip-path:polygon(100% 100%, 100% 15%, 0 100%); }

  .letter{
    position:absolute; left:8%; width:84%; height:78%;
    top:14%;
    background:var(--white);
    border-radius:4px;
    box-shadow:0 6px 16px rgba(0,0,0,0.18);
    display:flex; align-items:center; justify-content:center;
    padding:1rem;
    z-index:2;
    transition:transform 0.7s cubic-bezier(.34,1.56,.64,1);
    transform:translateY(6%);
  }
  .letter p{
    font-family:'Caveat', cursive;
    font-size:1.15rem;
    color:var(--ink);
    line-height:1.35;
    margin:0;
  }
  .flap{
    position:absolute; top:0; left:0; width:100%; height:58%;
    background:linear-gradient(160deg,#f4ecd6,#e6d9b6);
    clip-path:polygon(0 0, 100% 0, 50% 100%);
    transform-origin:top center;
    transition:transform 0.6s ease;
    z-index:3;
    box-shadow:0 2px 6px rgba(0,0,0,0.12);
  }
  .env-stage.open .flap{
    transform:rotateX(180deg);
    z-index:1;
  }
  .env-stage.open .letter{
    transform:translateY(-46%);
  }
  .cursor-hint{
    position:absolute; right:-6px; bottom:6px;
    font-size:1.6rem;
    animation:point 1.4s ease-in-out infinite;
    z-index:4;
  }
  @keyframes point{
    0%,100%{ transform:translate(0,0) rotate(0deg); }
    50%{ transform:translate(-4px,-6px) rotate(-8deg); }
  }
  .env-stage.open .cursor-hint{ display:none; }

  .reveal-btn{
    opacity:0; pointer-events:none;
    transition:opacity 0.5s ease;
  }
  .reveal-btn.show{ opacity:1; pointer-events:auto; }
</style>
</head>
<body>

<svg class="doodle float" style="top:8%; left:8%; width:30px;" viewBox="0 0 30 30"><path d="M15 1l3 11 11 3-11 3-3 11-3-11-11-3 11-3z" fill="none" stroke="var(--yellow)" stroke-width="2" stroke-linejoin="round"/></svg>
<svg class="doodle float delay" style="bottom:10%; left:12%; width:36px;" viewBox="0 0 40 40"><path d="M20 3C22 15 25 18 37 20C25 22 22 25 20 37C18 25 15 22 3 20C15 18 18 15 20 3Z" fill="none" stroke="var(--pink)" stroke-width="2" stroke-linejoin="round"/></svg>

<div class="page">
  <div class="eyebrow fade-up d1">satu ketukan lagi</div>
  <h1 class="headline fade-up d2" style="font-size:clamp(1rem,3vw,1.4rem);">klik amplopnya</h1>

  <div class="env-stage fade-up d3" id="envStage" onclick="openEnvelope()">
    <div class="env-back"></div>
    <div class="letter"><p>buat kamu&nbsp;:)</p></div>
    <div class="flap"></div>
    <div class="cursor-hint">👆</div>
  </div>

  <a href="page5.html" class="btn reveal-btn" id="revealBtn">baca suratnya</a>
</div>

<div class="step-track">
  <span></span><span></span><span></span><span class="active"></span><span></span><span></span>
</div>

<script>
  function openEnvelope(){
    document.getElementById('envStage').classList.add('open');
    document.getElementById('revealBtn').classList.add('show');
  }
</script>

</body>
</html>
