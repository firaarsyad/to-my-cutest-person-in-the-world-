<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>happy birthday</title>
<link rel="stylesheet" href="style.css">
<style>
  .stage{
    position:relative;
    width:min(920px, 100%);
    aspect-ratio:16/10;
    margin-top:0.5rem;
  }
  .cast{
    position:absolute;
    object-fit:contain;
    filter:drop-shadow(0 12px 18px rgba(0,0,0,0.28));
  }
  .cast.boy   { width:32%; left:34%; bottom:0; z-index:3; }
  .cast.cat   { width:24%; left:6%;  bottom:2%; z-index:2; }
  .cast.hamster{ width:20%; right:8%; bottom:4%; z-index:2; }
  .cast.anime1{ width:22%; left:-2%; bottom:-4%; z-index:1; opacity:0.96; }
  .cast.anime2{ width:22%; right:-2%; bottom:-4%; z-index:1; opacity:0.96; }
  .banner{
    position:relative; z-index:4;
    font-size:clamp(2.2rem, 7vw, 4.6rem);
    color:var(--white);
    margin:0 0 0.4rem 0;
  }
  .caption{
    font-size:clamp(1.1rem, 2.6vw, 1.5rem);
    color:var(--white);
    opacity:0.92;
  }
  @media (max-width:640px){
    .stage{ aspect-ratio:16/16; }
    .cast.anime1, .cast.anime2{ display:none; }
    .cast.boy{ width:40%; left:30%; }
    .cast.cat{ width:30%; left:2%; }
    .cast.hamster{ width:26%; right:2%; }
  }
</style>
</head>
<body>

<svg class="doodle float" style="top:5%; left:6%; width:30px;" viewBox="0 0 30 30"><path d="M15 1l3 11 11 3-11 3-3 11-3-11-11-3 11-3z" fill="none" stroke="var(--yellow)" stroke-width="2" stroke-linejoin="round"/></svg>
<svg class="doodle float delay" style="top:7%; right:8%; width:44px;" viewBox="0 0 44 44"><path d="M22 2C24 16 28 20 42 22C28 24 24 28 22 42C20 28 16 24 2 22C16 20 20 16 22 2Z" fill="none" stroke="var(--pink)" stroke-width="2" stroke-linejoin="round"/></svg>

<div class="page" style="padding-top:8vh;">
  <div class="eyebrow fade-up d1">untukmu, hari ini</div>
  <h1 class="script banner fade-up d2">Happy Birthday</h1>

  <div class="stage fade-up d3">
    <img class="cast anime1" src="assets/p1_i4_x37.png" alt="">
    <img class="cast cat" src="assets/p1_i2_x34.png" alt="">
    <img class="cast boy" src="assets/p1_i1_x33.png" alt="">
    <img class="cast hamster" src="assets/p1_i3_x35.png" alt="">
    <img class="cast anime2" src="assets/p1_i6_x174.png" alt="">
  </div>

  <p class="caption fade-up d4">to my cutest person in the world</p>
  <a href="page3.html" class="btn fade-up d4">next</a>
</div>

<div class="step-track">
  <span></span><span class="active"></span><span></span><span></span><span></span><span></span>
</div>

</body>
</html>
